name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: |
          python -m build

      - name: Verify package
        run: |
          ls -la dist/
          python -m pip install --no-index --find-links=dist wiki-notebook

      - name: Upload to PyPI
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m twine upload dist/wiki_notebook-*

      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/wiki_notebook-*
          body: |
            # Release ${{ github.ref_name }}

            ## Installation
            ```bash
            curl -sS https://install.wiki-notebook.coreconduit.com | bash
            ```

            ## Manual Installation
            ```bash
            git clone https://github.com/coreconduit/wiki-notebook.git
            cd wiki-notebook
            python3 -m venv .venv
            source .venv/bin/activate
            pip install -e ".[dev]"
            python scripts/init_db.py
            python -m wiki_notebook
            ```

            ## Changes
            See [CHANGELOG.md](https://github.com/coreconduit/wiki-notebook/blob/main/CHANGELOG.md) for details.

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
